<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Movie Review App">
    <meta property="og:description" content="Share review film favoritmu!">
    <meta property="og:image" content="https://i.imgur.com/movie-icon.png">
    <meta property="og:url" content="https://movie-lbf1.onrender.com">
    <meta name="twitter:card" content="summary_large_image">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>Spartapedia</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Gowun Dodum', sans-serif;
        }

        .mytitle {
            width: 100%;
            height: 250px;
            background-image: linear-gradient(0deg, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://movie-phinf.pstatic.net/20210715_95/1626338192428gTnJl_JPEG/movie_image.jpg');
            background-position: center;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .mytitle > button {
            width: 200px;
            height: 50px;
            background-color: transparent;
            color: white;
            border-radius: 50px;
            border: 1px solid white;
            margin-top: 10px;
        }

        .mytitle > button:hover {
            border: 2px solid white;
        }

        .mycomment {
            color: gray;
            font-size: 14px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .mycards {
            margin: 20px auto 0px auto;
            width: 95%;
            max-width: 1200px;
        }

        .mypost {
            width: 95%;
            max-width: 500px;
            margin: 20px auto 0px auto;
            padding: 20px;
            box-shadow: 0px 0px 3px 0px gray;
            display: none;
            background: white;
            border-radius: 10px;
        }

        .mybtns {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .mybtns > button {
            margin-right: 10px;
        }
        
        .card {
            transition: transform 0.2s;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        
        .card-img-top {
            height: 350px;
            object-fit: cover;
        }
        
        .rating {
            color: #ffc107;
            font-size: 18px;
            margin: 10px 0;
        }
        
        .movie-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .movie-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
    <script>
        $(document).ready(function () {
            listing();
        });
        
        function listing() {
            $.ajax({
                type: 'GET',
                url: '/movie',
                data: {},
                success: function (response) {
                    $('#cards-box').empty();
                    
                    let movies = response['movies'];
                    
                    if (movies.length === 0) {
                        $('#cards-box').append(`
                            <div class="col-12 text-center" style="padding: 50px;">
                                <h4>Belum ada review film</h4>
                                <p>Klik "Save movie" untuk menambahkan review pertama Anda!</p>
                            </div>
                        `);
                    } else {
                        for (let i = 0; i < movies.length; i++) {
                            let movie = movies[i];
                            
                            let stars = '';
                            let rating = parseFloat(movie.star);
                            for (let s = 1; s <= 5; s++) {
                                if (s <= rating) {
                                    stars += '⭐';
                                } else if (s - 0.5 <= rating) {
                                    stars += '½';
                                } else {
                                    stars += '☆';
                                }
                            }
                            
                            let defaultImage = 'https://image.tmdb.org/t/p/w500/8iATAc9zNftE4bJFS9DrGan23iK.jpg';
                            let imageUrl = (movie.image && movie.image !== '') ? movie.image : defaultImage;
                            
                            let cardHtml = `
                                <div class="col">
                                    <div class="card h-100">
                                        <img src="${imageUrl}" class="card-img-top" alt="${movie.title}" onerror="this.src='${defaultImage}'">
                                        <div class="card-body">
                                            <div class="movie-title">${movie.title}</div>
                                            <div class="movie-desc">${movie.description || 'Tidak ada deskripsi'}</div>
                                            <div class="rating">${stars} (${movie.star}/5)</div>
                                            <div class="mycomment">💬 ${movie.comment}</div>
                                        </div>
                                    </div>
                                </div>
                            `;
                            
                            $('#cards-box').append(cardHtml);
                        }
                    }
                }
            });
        }
        
        function posting() {
            let url = $('#url').val();
            let star = $('#star').val();
            let comment = $('#comment').val();
            
            if (!url) {
                alert('Mohon isi URL film!');
                return;
            }
            if (!star || star === '-- Select a rating--') {
                alert('Mohon pilih rating!');
                return;
            }
            if (!comment) {
                alert('Mohon isi komentar!');
                return;
            }
            
            $.ajax({
                type: 'POST',
                url: '/movie',
                data: {
                    url_give: url,
                    star_give: star,
                    comment_give: comment
                },
                success: function (response) {
                    alert(response['msg']);
                    $('#url').val('');
                    $('#star').val('-- Select a rating--');
                    $('#comment').val('');
                    close_box();
                    listing();
                },
                error: function() {
                    alert('Gagal menyimpan data. Periksa URL dan koneksi Anda.');
                }
            });
        }
        
        function open_box() {
            $('#post-box').show();
        }
        
        function close_box() {
            $('#post-box').hide();
        }
    </script>
</head>

<body>
    <div class="mytitle">
        <h1>My Favorite Movies</h1>
        <button onclick="open_box()">Save movie</button>
    </div>
    <div class="mypost" id="post-box">
        <div class="form-floating mb-3">
            <input id="url" type="text" class="form-control" placeholder="https://www.imdb.com/title/tt0068646/">
            <label>Movie URL</label>
        </div>
        <div class="input-group mb-3">
            <label class="input-group-text">Rating</label>
            <select class="form-select" id="star">
                <option selected>-- Select a rating--</option>
                <option value="1">⭐ (1/5)</option>
                <option value="2">⭐⭐ (2/5)</option>
                <option value="3">⭐⭐⭐ (3/5)</option>
                <option value="4">⭐⭐⭐⭐ (4/5)</option>
                <option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
            </select>
        </div>
        <div class="form-floating">
            <textarea id="comment" class="form-control" placeholder="Leave a comment here" style="height: 100px"></textarea>
            <label>Comment</label>
        </div>
        <div class="mybtns">
            <button onclick="posting()" type="button" class="btn btn-dark">Save</button>
            <button onclick="close_box()" type="button" class="btn btn-outline-dark">Close</button>
        </div>
    </div>
    <div class="mycards">
        <div class="row row-cols-1 row-cols-md-4 g-4" id="cards-box">
        </div>
    </div>
</body>

</html>
